<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Awen Study — Matrix Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================ THEMES ============================ */
  .app{
    --font-ui:'Hanken Grotesk',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --radius:14px;
    --pad:22px; --gap:14px; --chip-h:34px; --board-h:360px;
  }
  .app[data-density="compact"]{ --pad:16px; --gap:9px; --chip-h:29px; --board-h:300px; }

  .app[data-theme="console"]{
    --bg:#0c0e13; --panel:#13171f; --panel2:#1a1f2a; --line:#252c39; --line2:#323b4b;
    --ink:#e7edf6; --ink-dim:#98a4b6; --ink-faint:#5d6a7e;
    --accent:#56d4e6; --accent-ink:#05181c; --accent-soft:rgba(86,212,230,.13);
    --sel:rgba(86,212,230,.12); --sel-line:#56d4e6;
    --shadow:0 18px 44px rgba(0,0,0,.5);
  }
  .app[data-theme="lofi"]{
    --bg:#ece2d2; --panel:#f6efe3; --panel2:#fbf6ec; --line:#e1d4bf; --line2:#d0bfa3;
    --ink:#3a3026; --ink-dim:#7c6e5b; --ink-faint:#a8987f;
    --accent:#c26d38; --accent-ink:#fff6ec; --accent-soft:rgba(194,109,56,.13);
    --sel:rgba(194,109,56,.11); --sel-line:#c26d38;
    --shadow:0 18px 40px rgba(90,66,38,.16);
  }
  .app[data-theme="clean"]{
    --bg:#eef0f3; --panel:#ffffff; --panel2:#f8fafc; --line:#e7eaef; --line2:#d6dbe2;
    --ink:#1a1e26; --ink-dim:#5b6473; --ink-faint:#99a1ae;
    --accent:#4f63e8; --accent-ink:#ffffff; --accent-soft:rgba(79,99,232,.09);
    --sel:rgba(79,99,232,.08); --sel-line:#4f63e8;
    --shadow:0 16px 38px rgba(30,41,79,.12);
  }
  .app[data-theme="studio"]{
    --bg:#14100b; --panel:#1d1710; --panel2:#251d14; --line:#352a1e; --line2:#473928;
    --ink:#f1e7d7; --ink-dim:#b3a48b; --ink-faint:#7a6b54;
    --accent:#e2a455; --accent-ink:#1a1308; --accent-soft:rgba(226,164,85,.12);
    --sel:rgba(226,164,85,.12); --sel-line:#e2a455;
    --shadow:0 18px 44px rgba(0,0,0,.55);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ background:var(--page-bg,#0c0e13); font-family:'Hanken Grotesk',system-ui,sans-serif; }
  .app{ background:var(--bg); color:var(--ink); min-height:100vh; font-family:var(--font-ui);
        padding:30px clamp(16px,4vw,44px) 90px; transition:background .35s,color .35s; }
  .mono{ font-family:var(--font-mono); }
  ::selection{ background:var(--accent-soft); }

  /* ============================ TOP BAR ============================ */
  .topbar{ display:flex; align-items:flex-end; gap:24px; max-width:1240px; margin:0 auto;
           padding-bottom:16px; border-bottom:1px solid var(--line); }
  .brand{ display:flex; flex-direction:column; gap:5px; }
  .brand-mark{ font-size:25px; font-weight:800; letter-spacing:-.02em; line-height:1; }
  .brand-mark span{ font-weight:400; color:var(--ink-dim); margin-left:5px; }
  .brand-sub{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.22em;
              color:var(--ink-faint); }
  .modes{ display:flex; gap:4px; margin-left:auto; background:var(--panel); padding:4px;
          border-radius:11px; border:1px solid var(--line); }
  .mode-btn{ font-family:var(--font-ui); font-size:13.5px; font-weight:600; color:var(--ink-dim);
             background:transparent; border:none; padding:7px 15px; border-radius:8px; cursor:pointer;
             transition:.16s; }
  .mode-btn:hover{ color:var(--ink); }
  .mode-btn.on{ background:var(--accent); color:var(--accent-ink); }
  .help-btn{ display:inline-flex; align-items:center; gap:6px; font-family:var(--font-ui);
             font-size:12.5px; font-weight:600; color:var(--ink-dim); background:var(--panel);
             border:1px solid var(--line); border-radius:9px; padding:8px 13px; cursor:pointer;
             transition:.15s; white-space:nowrap; }
  .help-btn:hover{ color:var(--ink); border-color:var(--accent); }
  .help-q{ display:grid; place-items:center; width:16px; height:16px; border-radius:50%;
           background:var(--accent); color:var(--accent-ink); font-size:11px; font-weight:800; }
  .lang-toggle{ display:flex; gap:2px; background:var(--panel); border:1px solid var(--line);
                border-radius:9px; padding:3px; }
  .lang-opt{ font-family:var(--font-ui); font-size:12.5px; font-weight:700; color:var(--ink-dim);
             background:transparent; border:none; padding:6px 11px; border-radius:6px; cursor:pointer;
             transition:.15s; min-width:34px; }
  .lang-opt:hover{ color:var(--ink); }
  .lang-opt.on{ background:var(--accent); color:var(--accent-ink); }
  .topstat{ display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .topstat-n{ font-family:var(--font-mono); font-size:22px; font-weight:600; color:var(--ink);
              line-height:1; }
  .topstat-l{ font-size:10.5px; letter-spacing:.06em; color:var(--ink-faint);
              text-transform:uppercase; }

  .mode-hint{ max-width:1240px; margin:13px auto 0; font-size:13px; color:var(--ink-dim); }

  /* ============================ PRESETS ============================ */
  .presets{ max-width:1240px; margin:12px auto 0; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .presets-label{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-dim); margin-right:4px; white-space:nowrap; }
  .preset-btn{ display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px;
    background:var(--panel); border:1px solid var(--line); color:var(--ink); font-size:13px;
    cursor:pointer; transition:all .15s; white-space:nowrap; }
  .preset-btn:hover{ border-color:var(--accent); color:var(--accent); background:rgba(127,212,201,.08); }
  .preset-icon{ font-size:15px; }
  .preset-name{ font-size:12px; }

  /* ============================ REFERENCE CARD ============================ */
  .refcard{ max-width:1240px; margin:16px auto 0; display:flex; gap:18px; align-items:stretch;
            background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
            padding:16px; box-shadow:var(--shadow); }
  .ph{ width:104px; flex:0 0 104px; border-radius:10px; position:relative; overflow:hidden;
       background:
         repeating-linear-gradient(45deg, var(--panel2) 0 7px, var(--line) 7px 14px);
       border:1px solid var(--line2); display:flex; align-items:flex-end; }
  .ph-tag{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:.05em; color:var(--ink-faint);
           background:var(--panel); padding:2px 6px; margin:6px; border-radius:5px; }
  .refcard-body{ flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }
  .refcard-kicker{ font-family:var(--font-mono); font-size:10px; letter-spacing:.2em;
                   color:var(--accent); }
  .refcard-title{ font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .refcard-sub{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); }
  .refcard-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .refchip{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-dim); white-space:nowrap;
            background:var(--panel2); border:1px solid var(--line); border-radius:7px; padding:4px 8px; }
  .refchip b{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; color:var(--ink-faint);
              font-weight:600; }
  .refcard-actions{ display:flex; align-items:center; gap:12px; margin-top:auto; padding-top:8px; }
  .refcard-diff{ font-family:var(--font-mono); font-size:11px; color:var(--accent); }

  /* ============================ MATRIX BOARD ============================ */
  .board{ max-width:1240px; margin:16px auto 0; display:grid; grid-auto-flow:column;
          grid-auto-columns:minmax(146px,1fr); gap:var(--gap); overflow-x:auto;
          padding-bottom:4px; transition:filter .12s; }
  .board.rolling .col:not(.col-prod) .col-body{ filter:blur(.4px); }
  .col{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
        display:flex; flex-direction:column; overflow:hidden; }
  .col-prod{ background:var(--panel2); }
  .col-head{ display:flex; align-items:center; justify-content:space-between; gap:8px;
             padding:11px 12px 9px; border-bottom:1px solid var(--line); }
  .col-headL{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .col-code{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:.14em; color:var(--accent);
             font-weight:600; }
  .col-label{ font-size:13px; font-weight:700; letter-spacing:-.01em; }
  .col-lock{ flex:0 0 auto; display:grid; place-items:center; width:26px; height:26px; border-radius:7px;
             background:transparent; border:1px solid var(--line); color:var(--ink-faint); cursor:pointer;
             transition:.15s; }
  .col-lock:hover{ color:var(--ink-dim); border-color:var(--line2); }
  .col-lock.on{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }
  .col-body{ display:flex; flex-direction:column; gap:4px; padding:8px; overflow-y:auto;
             max-height:var(--board-h); scrollbar-width:thin; }

  .chip{ display:flex; align-items:center; gap:8px; min-height:var(--chip-h); padding:0 9px;
         border-radius:8px; border:1px solid transparent; background:transparent; color:var(--ink-dim);
         font-family:var(--font-ui); font-size:12.5px; text-align:left; cursor:pointer; transition:.13s; }
  .chip:hover{ background:var(--panel2); color:var(--ink); }
  .chip-dot{ width:6px; height:6px; border-radius:50%; flex:0 0 6px; background:var(--line2);
             transition:.13s; }
  .chip-label{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chip-check{ color:var(--accent-ink); display:flex; }
  .chip.sel{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink);
             font-weight:600; }
  .chip.sel .chip-dot{ background:var(--accent-ink); }
  .chip.ref{ border-color:var(--sel-line); background:var(--sel); color:var(--ink); }
  .chip.ref .chip-dot{ background:var(--sel-line); box-shadow:0 0 0 3px var(--accent-soft); }

  /* BPM column */
  .col-bpm{ }
  .bpm-body{ gap:10px !important; }
  .bpm-read{ display:flex; align-items:baseline; gap:4px; padding:2px 2px 0; }
  .bpm-num{ font-family:var(--font-mono); font-size:30px; font-weight:600; color:var(--ink); line-height:1; }
  .bpm-unit{ font-family:var(--font-mono); font-size:12px; color:var(--ink-faint); }
  .bpm-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
  .bpm-opt{ font-family:var(--font-mono); font-size:13px; padding:8px 0; border-radius:8px;
            border:1px solid var(--line); background:transparent; color:var(--ink-dim); cursor:pointer;
            transition:.13s; }
  .bpm-opt:hover{ color:var(--ink); border-color:var(--line2); }
  .bpm-opt.sel{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); font-weight:600; }
  .bpm-note{ font-family:var(--font-mono); font-size:9.5px; color:var(--ink-faint); letter-spacing:.04em; }

  /* ============================ CONSOLE ============================ */
  .console{ max-width:1240px; margin:16px auto 0; display:flex; align-items:center; gap:20px;
            flex-wrap:wrap; background:var(--panel); border:1px solid var(--line);
            border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
  .console-recipe{ flex:1; min-width:280px; }
  .console-kicker{ display:flex; align-items:center; gap:10px; font-family:var(--font-mono);
                   font-size:10px; letter-spacing:.18em; color:var(--ink-faint); margin-bottom:8px; }
  .console-mut{ letter-spacing:.04em; color:var(--accent); }
  .recipe{ display:flex; flex-wrap:wrap; gap:6px; }
  .rchip{ display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--ink); white-space:nowrap;
          background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:5px 9px; }
  .rchip b{ font-family:var(--font-mono); font-size:9px; letter-spacing:.07em; color:var(--ink-faint);
            font-weight:600; }
  .console-actions{ display:flex; gap:10px; }

  .btn{ display:inline-flex; align-items:center; gap:8px; font-family:var(--font-ui); font-size:13.5px;
        font-weight:600; padding:11px 18px; border-radius:10px; border:1px solid var(--line); cursor:pointer;
        transition:.15s; white-space:nowrap; }
  .btn:disabled{ opacity:.5; cursor:default; }
  .btn-primary{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }
  .btn-primary:not(:disabled):hover{ filter:brightness(1.07); }
  .btn-ghost{ background:transparent; color:var(--ink-dim); }
  .btn-ghost:not(:disabled):hover{ color:var(--ink); border-color:var(--line2); }
  .btn-ghost.sm{ font-size:12px; padding:7px 11px; }

  /* ============================ FEED ============================ */
  .feed{ max-width:1240px; margin:28px auto 0; }
  .feed-head{ display:flex; align-items:center; justify-content:space-between;
              padding-bottom:12px; border-bottom:1px solid var(--line); }
  .feed-title{ font-family:var(--font-mono); font-size:11px; letter-spacing:.2em; color:var(--ink-faint); }
  .feed-clear{ font-family:var(--font-ui); font-size:12px; color:var(--ink-faint); background:none;
               border:none; cursor:pointer; white-space:nowrap; }
  .feed-clear:hover{ color:var(--accent); }
  .empty{ display:flex; flex-direction:column; align-items:center; gap:10px; padding:54px 0;
          color:var(--ink-faint); }
  .empty p{ margin:0; font-size:13.5px; }
  .empty b{ color:var(--ink-dim); }
  .feed-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px;
              margin-top:16px; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
         padding:16px 17px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:9px; }
  .card-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .card-headL{ display:flex; align-items:center; gap:10px; min-width:0; }
  .card-id{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); letter-spacing:.05em; white-space:nowrap; }
  .card-lineage{ font-family:var(--font-mono); font-size:10px; color:var(--accent);
                 background:var(--accent-soft); padding:2px 7px; border-radius:6px; }
  .card-headR{ display:flex; align-items:center; gap:8px; }
  .status{ display:inline-flex; align-items:center; gap:6px; font-family:var(--font-ui); font-size:11.5px;
           font-weight:600; padding:4px 10px; border-radius:20px; border:1px solid var(--line);
           background:var(--panel2); color:var(--ink-dim); cursor:pointer; }
  .status-dot{ width:6px; height:6px; border-radius:50%; background:var(--ink-faint); }
  .status.s-draft .status-dot{ background:var(--ink-faint); }
  .status.s-approved .status-dot{ background:#e2a455; }
  .status.s-queued .status-dot{ background:#56b6e6; }
  .status.s-published{ color:var(--accent); border-color:var(--accent); }
  .status.s-published .status-dot{ background:var(--accent); }
  .icon-btn{ width:24px; height:24px; border-radius:7px; border:1px solid var(--line); background:transparent;
             color:var(--ink-faint); font-size:16px; line-height:1; cursor:pointer; }
  .icon-btn:hover{ color:var(--ink); border-color:var(--line2); }

  .card-title{ font-size:21px; font-weight:700; letter-spacing:-.015em; }
  .card-title.dim{ color:var(--ink-faint); font-weight:500; font-size:15px; }
  .card-tagline{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-dim); margin-top:-4px; }
  .tags{ display:flex; flex-wrap:wrap; gap:5px; }
  .tag{ display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-dim); white-space:nowrap;
        background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:3px 7px; }
  .tag b{ font-family:var(--font-mono); font-size:8.5px; letter-spacing:.06em; color:var(--ink-faint);
          font-weight:600; }

  .block{ background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:11px 12px;
          display:flex; flex-direction:column; gap:7px; }
  .block-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .block-labels{ display:flex; flex-direction:column; gap:3px; min-width:0; }
  .block-label{ display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
                font-family:var(--font-mono); font-size:10px; letter-spacing:.13em; color:var(--ink-faint); }
  .field-hint{ font-family:var(--font-ui); font-size:10px; font-weight:500; letter-spacing:0;
               color:var(--ink-faint); text-transform:none; }
  .copy{ display:inline-flex; align-items:center; gap:5px; font-family:var(--font-ui); font-size:11px; white-space:nowrap;
         color:var(--ink-dim); background:transparent; border:1px solid var(--line); border-radius:7px;
         padding:4px 9px; cursor:pointer; transition:.13s; }
  .copy:hover{ color:var(--ink); border-color:var(--line2); }
  .copy.done{ color:var(--accent); border-color:var(--accent); }
  .copy.fail{ color:#e06a5a; border-color:#e06a5a; }
  .kv{ display:flex; gap:9px; font-size:13px; line-height:1.5; }
  .kv .k{ flex:0 0 50px; font-family:var(--font-mono); font-size:10px; letter-spacing:.05em;
          color:var(--ink-faint); padding-top:3px; text-transform:uppercase; }
  .kv .v{ flex:1; min-width:0; color:var(--ink); word-break:break-word; }
  .kv .v.mono{ font-family:var(--font-mono); font-size:11.5px; line-height:1.55; }
  .kv .v.dim{ color:var(--ink-dim); }

  .sk{ display:flex; flex-direction:column; gap:9px; padding:6px 0; }
  .sk-line{ height:11px; border-radius:6px;
            background:linear-gradient(90deg,var(--line) 25%,var(--line2) 37%,var(--line) 63%);
            background-size:400% 100%; animation:shimmer 1.3s ease infinite; }
  .sk-line.w90{ width:90%; } .sk-line.w80{ width:80%; } .sk-line.w60{ width:60%; } .sk-line.w40{ width:40%; }
  @keyframes shimmer{ 0%{ background-position:100% 0; } 100%{ background-position:0 0; } }

  @media (max-width:560px){
    .topbar{ flex-wrap:wrap; gap:14px; }
    .modes{ margin-left:0; width:100%; }
    .mode-btn{ flex:1; }
    .feed-list{ grid-template-columns:1fr; }
  }

  .track-scene{ white-space:nowrap; }

  /* ============================ ALBUM CONSOLE ============================ */
  .albcon{ max-width:1240px; margin:16px auto 0; display:grid; grid-template-columns:1fr 300px;
           gap:16px; align-items:stretch; }
  .albcon-axes{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
                padding:14px 16px; box-shadow:var(--shadow); }
  .albcon-kicker{ font-family:var(--font-mono); font-size:10px; letter-spacing:.16em;
                  color:var(--ink-faint); margin-bottom:11px; }
  .axis-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:300px; overflow-y:auto;
              padding-right:2px; }
  .axis-btn{ display:flex; flex-direction:column; gap:3px; text-align:left; padding:11px 12px;
             border-radius:10px; border:1px solid var(--line); background:var(--panel2);
             color:var(--ink-dim); cursor:pointer; transition:.14s; }
  .axis-btn:hover{ border-color:var(--line2); color:var(--ink); }
  .axis-btn.on{ border-color:var(--accent); background:var(--accent-soft); color:var(--ink); }
  .axis-name{ font-family:var(--font-ui); font-size:14px; font-weight:700; letter-spacing:-.01em; }
  .axis-btn.on .axis-name{ color:var(--accent); }
  .axis-zh{ font-size:11px; line-height:1.4; color:var(--ink-faint); }

  .albcon-side{ display:flex; flex-direction:column; gap:11px; background:var(--panel);
                border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px;
                box-shadow:var(--shadow); }
  .anchor-readout{ display:flex; flex-direction:column; gap:7px; }
  .ar-row{ display:flex; gap:9px; align-items:baseline; }
  .ar-tag{ font-family:var(--font-mono); font-size:9px; letter-spacing:.12em; padding:3px 6px;
           border-radius:5px; flex:0 0 auto; }
  .ar-move .ar-tag{ background:var(--accent); color:var(--accent-ink); }
  .ar-hold .ar-tag{ background:var(--panel2); border:1px solid var(--line); color:var(--ink-faint); }
  .ar-vals{ font-size:12px; color:var(--ink); line-height:1.4; }
  .ar-move .ar-vals{ font-weight:600; color:var(--accent); }
  .count-row{ display:flex; align-items:center; justify-content:space-between; padding-top:4px;

      en: 'Almost fully locked, tiny variations only (EP form, capped at 5).' },

  function sampleSeq(arr, n) {
    if (n <= 1) return [arr[0]];
    const out = [];
    for (let i = 0; i < n; i++) out.push(arr[Math.round(i * (arr.length - 1) / (n - 1))]);
    return out;
  }
  function nearest(arr, target) {
    return arr.reduce((best, v) => Math.abs(v - target) < Math.abs(best - target) ? v : best, arr[0]);
  }
  function rampBpm(n, from, to) {
    const out = [];
    for (let i = 0; i < n; i++) { const p = n > 1 ? i / (n - 1) : 0; out.push(nearest(BPM.values, from + (to - from) * p)); }
    return out;
  }

  // Returns { axis, recipes:[selection…] }. recipes.length === effective track count.
  function buildAlbum(axisKey, base, count) {
    const axis = ALBUM_AXES.find(a => a.key === axisKey) || ALBUM_AXES[0];
    const n = Math.max(3, Math.min(count, axis.maxTracks || count));
    const recipes = [];
    const mk = (over) => Object.assign({}, base, over);

    if (axis.gen === 'focus') { // BPM rises then falls, mood deepens mid-set
      for (let i = 0; i < n; i++) {
        const pos = n > 1 ? i / (n - 1) : 0;
        const tri = 1 - Math.abs(0.5 - pos) * 2;
        recipes.push(mk({ bpm: nearest(BPM.values, 55 + tri * (68 - 55)),
                          mood: (pos > 0.28 && pos < 0.72) ? 'Focused' : base.mood }));
      }
    } else if (axis.gen === 'morning') { // dawn→afternoon, energy rising, hopeful→focused
      const tseq = sampleSeq(TIME_MORNING, n), bseq = rampBpm(n, 55, 68);
      for (let i = 0; i < n; i++) {
        const pos = n > 1 ? i / (n - 1) : 0;
        recipes.push(mk({ time: tseq[i], bpm: bseq[i], mood: pos < 0.5 ? 'Hopeful' : 'Focused' }));
      }
    } else if (axis.gen === 'latenight') { // evening→3am, slowing, drifting inward
      const tseq = sampleSeq(TIME_LATE, n), bseq = rampBpm(n, 65, 55),
            mseq = sampleSeq(['Calm', 'Dreamy', 'Nostalgic', 'Lonely'], n);
      for (let i = 0; i < n; i++) recipes.push(mk({ time: tseq[i], bpm: bseq[i], mood: mseq[i] }));
    } else if (axis.gen === 'storm') { // weather front building then clearing
      const nseq = sampleSeq(STORM_FRONT, n);
      for (let i = 0; i < n; i++) {
        const pos = n > 1 ? i / (n - 1) : 0;
        recipes.push(mk({ nature: nseq[i], mood: (pos > 0.3 && pos < 0.6) ? 'Bittersweet' : base.mood }));
      }
    } else if (axis.gen === 'ep') { // near-static micro-variation
      const nseq = sampleSeq(NATURE_SEASON.slice(4), n), tseq = sampleSeq(TIME_LATE, n);
      for (let i = 0; i < n; i++) recipes.push(mk({ nature: nseq[i], time: tseq[i] }));
    } else { // single-dimension sequence (day / place / season / mood / comfort)
      const dim = axis.moves[0], seq = sampleSeq(axis.seq[dim], n);
      for (let i = 0; i < n; i++) recipes.push(mk({ [dim]: seq[i] }));
    }
    return { axis, recipes };
  }

  // Which dims are held constant (the "anchor") for a given axis.
  function anchorDims(axisKey) {
    const axis = ALBUM_AXES.find(a => a.key === axisKey) || ALBUM_AXES[0];
    const moving = new Set(axis.moves);
    return ['style', 'instrument', 'environment', 'nature', 'time', 'mood', 'bpm']

      const moveLabels = axis.moves.map(k => k === 'bpm' ? s.bpm + ' bpm' : s[k]).join(' · ');

        prompt: `${axis.moves.includes('bpm') ? s.bpm + ' bpm, ' : ''}${s.mood.toLowerCase()} ${s.style.toLowerCase()} in a ${s.environment.toLowerCase()} at ${s.time.toLowerCase()}${s.nature === 'None' ? '' : ', ' + s.nature.toLowerCase() + ' ambience'}.`,
      };

    const firstT = recipes[0], lastT = recipes[recipes.length - 1];
    const description =
      `Built from a single ${base.instrument.toLowerCase()} identity recorded in a ${base.environment.toLowerCase()}, ` +
      `${recipes.length} instrumental tracks follow one ${axis.label.toLowerCase()}. ` +
      `It opens with “${tracks[0].title}” and closes on “${tracks[tracks.length - 1].title}”, ` +
      `holding the same warm tape texture and ${base.bpm} bpm pulse throughout — made for long, uninterrupted study.`;

      `全程维持同样温暖的磁带质感与 ${base.bpm} 左右的脉动——为长时间不被打断的学习而作。`;
    return {

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
/* Awen Study — UI components. Loaded as Babel JSX. Exports to window. */
const { useState, useRef, useEffect } = React;

/* ---------- tiny inline icons (kept geometric, no hand-drawn art) ---------- */
function Icon({ name, size = 16 }) {
  const s = { width: size, height: size, strokeWidth: 1.6, fill: 'none',
              stroke: 'currentColor', strokeLinecap: 'round', strokeLinejoin: 'round' };
  const paths = {
    lock:   <><rect x="4" y="9" width="12" height="9" rx="1.5" /><path d="M6.5 9V6.5a3.5 3.5 0 0 1 7 0V9" /></>,
    unlock: <><rect x="4" y="9" width="12" height="9" rx="1.5" /><path d="M6.5 9V6.5a3.5 3.5 0 0 1 6.8-1.2" /></>,
    dice:   <><rect x="3" y="3" width="14" height="14" rx="3" /><circle cx="7" cy="7" r="1.1" fill="currentColor" stroke="none"/><circle cx="13" cy="13" r="1.1" fill="currentColor" stroke="none"/><circle cx="10" cy="10" r="1.1" fill="currentColor" stroke="none"/></>,
    bolt:   <path d="M11 2 4 11h5l-1 7 7-9h-5z" />,
    copy:   <><rect x="6" y="6" width="10" height="11" rx="1.6" /><path d="M12 6V4.6A1.6 1.6 0 0 0 10.4 3H4.6A1.6 1.6 0 0 0 3 4.6v7A1.6 1.6 0 0 0 4.6 13H6" /></>,
    check:  <path d="M4 10.5 8 14.5 16 5.5" />,
    reset:  <><path d="M4 10a6 6 0 1 1 1.8 4.3" /><path d="M4 14v-3.2h3.2" /></>,
    wave:   <path d="M2 10c2 0 2-4 4-4s2 8 4 8 2-8 4-8 2 4 4 4" />,
    play:   <path d="M6 4l9 6-9 6z" fill="currentColor" stroke="none" />,
    image:  <><rect x="3" y="4" width="14" height="12" rx="2" /><circle cx="7.4" cy="8" r="1.3" /><path d="M3.5 14l4-3.4 3 2.4 3.2-3 2.8 2.6" /></>,
  };
  return <svg viewBox="0 0 20 20" style={s} aria-hidden="true">{paths[name]}</svg>;
}

/* ---------- a single selectable cell ---------- */
function Chip({ label, selected, fromRef, onClick }) {
  return (
    <button type="button"
      className={'chip' + (selected ? ' sel' : '') + (fromRef && !selected ? ' ref' : '')}
      onClick={onClick}>
      <span className="chip-dot" />
      <span className="chip-label">{label}</span>
      {selected && <span className="chip-check"><Icon name="check" size={13} /></span>}
    </button>
  );
}

/* ---------- one dimension column ---------- */
function Column({ dim, value, onPick, showLock, locked, onToggleLock, refValue }) {
  return (
    <div className={'col' + (dim.layer === 'production' ? ' col-prod' : '')}>
      <div className="col-head">
        <div className="col-headL">
          <span className="col-code">{dim.code}</span>
          <span className="col-label">{window.I18N.isZh() ? (dim.zh || dim.label) : dim.label}</span>
        </div>
        {showLock && (
          <button type="button"
            className={'col-lock' + (locked ? ' on' : '')}
            title={locked ? 'Locked — kept on shuffle' : 'Unlocked — will reshuffle'}
            onClick={onToggleLock}>
            <Icon name={locked ? 'lock' : 'unlock'} size={14} />
          </button>
        )}
      </div>
      <div className="col-body">
        {dim.options.map(opt => (
          <Chip key={opt} label={opt} selected={value === opt}
            fromRef={refValue === opt} onClick={() => onPick(dim.key, opt)} />
        ))}
      </div>
    </div>
  );
}

/* ---------- BPM is a stepped range, not a list ---------- */
function BpmColumn({ bpm, value, onPick, showLock, locked, onToggleLock }) {
  return (
    <div className="col col-prod col-bpm">
      <div className="col-head">
        <div className="col-headL">
          <span className="col-code">{bpm.code}</span>
          <span className="col-label">{T('tempo')}</span>
        </div>
        {showLock && (
          <button type="button" className={'col-lock' + (locked ? ' on' : '')}
            onClick={onToggleLock} title={locked ? 'Locked' : 'Unlocked'}>
            <Icon name={locked ? 'lock' : 'unlock'} size={14} />
          </button>
        )}
      </div>
      <div className="col-body bpm-body">
        <div className="bpm-read"><span className="bpm-num">{value}</span><span className="bpm-unit">bpm</span></div>
        <div className="bpm-grid">
          {bpm.values.map(v => (
            <button key={v} type="button"
              className={'bpm-opt' + (value === v ? ' sel' : '')}
              onClick={() => onPick('bpm', v)}>{v}</button>
          ))}
        </div>
        <div className="bpm-note">{T('brandRange')}</div>
      </div>
    </div>

}

function Placeholder({ label, ratio = '1 / 1' }) {
  return <div className="ph" style={{ aspectRatio: ratio }}><span className="ph-tag">{label}</span></div>;
}

/* ---------- reference (imported lo-fi) card, shown in Decompose mode ---------- */
function ReferenceCard({ sample, sel, onApply, onReset }) {
  const A = window.AWEN;
  const muts = A.mutations(sel);
  return (
    <div className="refcard">
      <Placeholder label="cover art" />
      <div className="refcard-body">

        <div className="refcard-chips">
          {Object.entries(sample.decomposed).map(([k, v]) => (
            <span key={k} className="refchip"><b>{(A.DIMS.find(d => d.key === k)?.code) || 'BPM'}</b>{v}</span>
          ))}
        </div>

          </button>

            {muts === 0 ? 'identical to source' : `${muts} mutation${muts > 1 ? 's' : ''} from source`}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- robust clipboard copy: works inside sandboxed iframes too ---------- */
async function copyText(text) {
  // 1) modern API (needs secure context + permission — often blocked in embedded preview)
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) { /* fall through */ }
  // 2) legacy execCommand via a temporary textarea
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '0';
    ta.style.left = '0';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}

/* ---------- copy-to-clipboard button ---------- */
function CopyBtn({ text, label }) {
  const [state, setState] = useState('idle'); // idle | done | fail
  return (
    <button type="button" className={'copy' + (state === 'done' ? ' done' : '') + (state === 'fail' ? ' fail' : '')}
      onClick={async () => {
        const ok = await copyText(text);
        setState(ok ? 'done' : 'fail');
        setTimeout(() => setState('idle'), 1700);
      }}>
      <Icon name={state === 'done' ? 'check' : 'copy'} size={13} />
      {state === 'done' ? T('copied') : state === 'fail' ? T('copyFail') : (label || T('copy'))}
    </button>
  );
}

<script type="text/babel">
/* Awen Study — Matrix Generator. Main app: mode orchestration, AI generation,
   persistence, theming. Babel JSX. Uses React.useState directly (no top-level
   hook destructuring) to avoid global-const collisions across babel scripts. */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "console",
  "density": "regular",
  "useAI": true
} /*EDITMODE-END*/;

const STORE_KEY = 'awen_matrix_state_v1';
const GUIDE_KEY = 'awen_guide_seen_v1';

const MODE_INFO = {
  pick: { label: 'Pick', zh: '点选每列一个元素，拼出一首歌', ja: 'ピック', ko: '픽', fr: 'Choisir', es: 'Elegir', de: 'Wählen', pt: 'Escolher' },

  decompose: { label: 'Decompose', zh: '从导入的参考曲拆解出发，逐项变异 remix', ja: '分解', ko: '분해', fr: 'Décomposer', es: 'Descomponer', de: 'Zerlegen', pt: 'Decompor' },
  album: { label: 'Album', zh: '锁定声音身份，沿一条行进轴一次铺出整张专辑', ja: 'アルバム', ko: '앨범', fr: 'Album', es: 'Álbum', de: 'Album', pt: 'Álbum' }
};

function loadState() {
  try {return JSON.parse(localStorage.getItem(STORE_KEY)) || null;} catch (e) {return null;}
}

function App() {
  const A = window.AWEN;
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const saved = React.useRef(loadState()).current;
  const [mode, setMode] = React.useState(saved?.mode || 'pick');
  const [sel, setSel] = React.useState(saved?.sel || { ...A.DEFAULTS });
  const [locks, setLocks] = React.useState(saved?.locks || {});
  const [songs, setSongs] = React.useState(saved?.songs || []);
  const [albums, setAlbums] = React.useState(saved?.albums || []);
  const [axisKey, setAxisKey] = React.useState(saved?.axisKey || 'day');
  const [trackCount, setTrackCount] = React.useState(saved?.trackCount || 10);
  const [albumSeq, setAlbumSeq] = React.useState(saved?.albumSeq || 1);
  const [seq, setSeq] = React.useState(saved?.seq || 1);

  const [showGuide, setShowGuide] = React.useState(false);
  const [showLangs, setShowLangs] = React.useState(false);
  const [lang, setLang] = React.useState(saved?.lang || 'zh');
  window.I18N.lang = lang; // set before children render so T() resolves correctly

  // First-visit: auto-open the usage guide once.
  React.useEffect(() => {
    try {if (!localStorage.getItem(GUIDE_KEY)) {setShowGuide(true);localStorage.setItem(GUIDE_KEY, '1');}} catch (e) {}
  }, []);

  // Close lang dropdown on outside click
  React.useEffect(() => {
    if (!showLangs) return;
    const h = (e) => { if (!e.target.closest('.lang-toggle')) setShowLangs(false); };
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, [showLangs]);

  // persist
  React.useEffect(() => {
    const clean = songs.filter((s) => !s.generating);

  }, [mode, sel, locks, songs, albums, seq, albumSeq, axisKey, trackCount, lang]);

  function toggleLock(key) {setLocks((prev) => ({ ...prev, [key]: !prev[key] }));}

  }
  async function complete(prompt) {
    const r = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Token': getAccessToken(),
      },
      body: JSON.stringify({ prompt }),
    });
    if (r.status === 401) {
      localStorage.removeItem('awen_music_token');
      throw new Error(T('wrongPassword'));
    }
    if (!r.ok) throw new Error('worker ' + r.status);
    const { text } = await r.json();
    return text;
  }

  async function callAI(s) {
    const prompt =
    `You are the prompt engine for "Awen Study", a lo-fi study-music content factory run by awen yang.
Given a song RECIPE (one value per matrix dimension), write production-ready prompts.

RECIPE
- Environment: ${s.environment}
- Nature: ${s.nature}
- Time: ${s.time}
- Mood: ${s.mood}
- Instrument: ${s.instrument}
- Style: ${s.style}
- BPM: ${s.bpm}

Return ONLY minified JSON (no markdown, no commentary) with EXACTLY this shape:
{"title":"evocative 2-5 word Title Case song name","tagline":"3-6 word mood tagline lowercase","suno":{"style":"comma-separated Suno style tags under 140 chars; MUST include a production/texture layer (e.g. warm tape saturation, vinyl crackle, drum treatment or 'no drums', room reverb, low-pass) plus genre, mood, instrument, bpm, instrumental","prompt":"ONE short instrumental sentence (Suno barely reads this for instrumentals — keep it tight)","exclude":"comma-separated elements to exclude"},"cover":"square 1:1 album-cover art prompt: strong centered composition, calm negative space near the top for a title, light + mood, no text, no motion words","video":"16:9 looping background-video prompt: slow cinematic camera drift, lighting, shallow depth of field, seamless loop"}
Keep everything calm, warm, instrumental and study-friendly. No vocals.`;
    const raw = await complete(prompt);
    const a = raw.indexOf('{'),b = raw.lastIndexOf('}');
    if (a < 0 || b < 0) throw new Error('no json');
    const j = JSON.parse(raw.slice(a, b + 1));
    if (!j.title || !j.suno || !j.suno.prompt || !(j.cover || j.video)) throw new Error('bad shape');
    return {
      title: String(j.title).slice(0, 60),
      tagline: j.tagline ? String(j.tagline) : `${s.mood.toLowerCase()} · ${s.time.toLowerCase()}`,
      suno: {
        style: String(j.suno.style || ''),
        prompt: String(j.suno.prompt),
        exclude: String(j.suno.exclude || 'vocals, lyrics')
      },
      cover: String(j.cover || ''),
      video: String(j.video || j.veo || '')
    };
  }

  async function generate() {
    if (busy) return;
    const id = 'AWN-' + String(seq).padStart(4, '0');
    setSeq((n) => n + 1);
    const baseSel = { ...sel };
    const muts = A.mutations(baseSel);
    const lineage = mode === 'decompose' ?
    muts === 0 ? 'cloned from REF' : `mutated from REF · ${muts} change${muts > 1 ? 's' : ''}` :
    null;
    setSongs((prev) => [{ id, sel: baseSel, status: 'Draft', generating: true, lineage }, ...prev]);
    setBusy(true);

    let ai = null;
    if (t.useAI) {
      try {ai = await callAI(baseSel);} catch (e) {
        window.alert(T('aiFailed') + '\n' + e.message);
        ai = null;
      }
    }
    if (!ai) ai = A.fallbackPrompt(baseSel);

    setSongs((prev) => prev.map((x) => x.id === id ? { ...x, generating: false, ai } : x));
    setBusy(false);
  }

  function setStatus(id, status) {setSongs((prev) => prev.map((s) => s.id === id ? { ...s, status } : s));}
  function removeSong(id) {setSongs((prev) => prev.filter((s) => s.id !== id));}

  // ---- album generation: one AI call returns the whole coherent album ----
  async function callAlbumAI(axis, base, recipes) {
    const lines = recipes.map((s, i) =>
    `${i + 1}. env=${s.environment}; nature=${s.nature}; time=${s.time}; mood=${s.mood}; inst=${s.instrument}; style=${s.style}; bpm=${s.bpm}`).join('\n');
    const prompt =
    `You are the album engine for "Awen Study", a lo-fi study-music label by awen yang.
Design ONE coherent instrumental album. All tracks share a fixed sonic identity; only the "${axis.label}" axis progresses across them (${axis.moves.join(' + ')}).

TRACKS (one recipe per line):
${lines}

Return ONLY minified JSON, no markdown, EXACTLY:
{"album":"evocative 2-4 word album title (Title Case)","concept":"one-line concept under 90 chars","description":"a 2-3 sentence liner note: the inspiration/source behind the album, the journey it traces, and what kind of tracks it gathers; reference the opening and closing track feel","description_zh":"the SAME liner note written naturally in fluent simplified Chinese (简体中文)","anchor":"a single shared Suno style string (under 150 chars) reused on every track; MUST include a production/texture layer (warm tape saturation, vinyl crackle, drum treatment or 'no drums', room reverb, low-pass) so timbre stays consistent","cover":"square 1:1 cover-art prompt: centered composition with negative space near the top for the album title, light + mood, no text, no motion words","video":"16:9 looping background-video prompt with slow cinematic camera drift + lighting, shallow depth of field, seamless loop","tracks":[{"title":"evocative 2-4 word track title","scene":"2-4 word scene label","prompt":"one-sentence Suno description for THIS track"}]}
The tracks array MUST have exactly ${recipes.length} items, in order. Everything calm, warm, instrumental, study-friendly, no vocals.`;
    const raw = await complete(prompt);
    const a = raw.indexOf('{'),b = raw.lastIndexOf('}');
    if (a < 0 || b < 0) throw new Error('no json');
    const j = JSON.parse(raw.slice(a, b + 1));
    if (!j.album || !Array.isArray(j.tracks) || j.tracks.length !== recipes.length) throw new Error('bad shape');
    return {
      album: String(j.album).slice(0, 60),
      concept: String(j.concept || ''),
      description: String(j.description || ''),
      descriptionZh: String(j.description_zh || ''),
      anchor: String(j.anchor || ''),
      cover: String(j.cover || ''),
      video: String(j.video || ''),
      tracks: j.tracks.map((t, i) => ({
        title: String(t.title || `Track ${i + 1}`),
        scene: String(t.scene || `${recipes[i].time} · ${recipes[i].environment}`),
        prompt: String(t.prompt || '')
      }))
    };
  }

  async function buildAlbum() {
    if (busy) return;
    const { axis, recipes } = A.buildAlbum(axisKey, sel, trackCount);
    const id = 'ALB-' + String(albumSeq).padStart(3, '0');
    setAlbumSeq((n) => n + 1);
    setAlbums((prev) => [{ id, axisLabel: axis.label, status: 'Draft', generating: true }, ...prev]);
    setBusy(true);
    let data = null;
    if (t.useAI) {
      try {data = await callAlbumAI(axis, sel, recipes);} catch (e) {
        window.alert(T('aiFailed') + '\n' + e.message);
        data = null;
      }
    }
    if (!data) data = A.fallbackAlbum(axisKey, sel, recipes);
    setAlbums((prev) => prev.map((x) => x.id === id ? { ...x, generating: false, data } : x));
    setBusy(false);
  }
  function setAlbumStatus(id, status) {setAlbums((prev) => prev.map((a) => a.id === id ? { ...a, status } : a));}
  function removeAlbum(id) {setAlbums((prev) => prev.filter((a) => a.id !== id));}

  const showLock = mode === 'shuffle';
  const sampleRef = A.REFERENCE;

  return (
    <div className="app" data-theme={t.theme} data-density={t.density}>
      {/* top bar */}
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark">Awen</div>
          <div className="brand-sub">MATRIX GENERATOR</div>
        </div>
        <div className="modes">
          {Object.keys(MODE_INFO).map((m) =>
          <button key={m} type="button"
          className={'mode-btn' + (mode === m ? ' on' : '')}
          onClick={() => switchMode(m)}>{window.I18N.labelFor(MODE_INFO[m])}</button>
          )}
        </div>
        <button type="button"
          className={'help-btn' + (t.useAI ? ' on' : '')}
          style={t.useAI ? {background:'rgba(127,212,201,0.15)',color:'var(--accent)'} : {}}
          title={t.useAI ? T('aiOnTip') : T('aiOffTip')}}
          onClick={() => {
            if (!t.useAI) localStorage.removeItem('awen_music_token');
            setTweak('useAI', !t.useAI);
          }}>
          ✦ AI {t.useAI ? 'ON' : 'OFF'}
        </button>
        <button type="button" className="help-btn" onClick={() => setShowGuide(true)}>
          <span className="help-q">?</span> {T('help')}
        </button>
        <div className="lang-toggle" style={{position:'relative'}}>
          <button type="button" className="lang-opt" style={{display:'flex',alignItems:'center',gap:4,padding:'6px 11px'}}
            onClick={() => setShowLangs(!showLangs)}>
            {window.I18N.LANGS.find(l=>l.code===lang)?.native || lang}
            <span style={{fontSize:9,opacity:.6}}>▼</span>
          </button>
          {showLangs && <div className="lang-dropdown" style={{position:'absolute',top:'100%',right:0,marginTop:4,background:'var(--panel)',border:'1px solid var(--line)',borderRadius:10,padding:4,zIndex:100,minWidth:120,boxShadow:'var(--shadow)'}}>
            {window.I18N.LANGS.map(l =>
              <button key={l.code} type="button" className={'lang-opt' + (lang === l.code ? ' on' : '')}
                style={{display:'block',width:'100%',textAlign:'left',padding:'6px 12px',borderRadius:6,fontSize:13}}
                onClick={() => { setLang(l.code); setShowLangs(false); }}>
                {l.native} <span style={{opacity:.5,fontSize:11}}>{l.code.toUpperCase()}</span>
              </button>
            )}
          </div>}
        </div>
        <div className="topstat">
          <span className="topstat-n">{mode === 'album' ? albums.filter((a) => !a.generating).length : songs.filter((s) => !s.generating).length}</span>
          <span className="topstat-l">{mode === 'album' ? T('albumsBuilt') : T('songsProduced')}</span>
        </div>
      </header>

      <div className="mode-hint">{T({ pick: 'hintPick', shuffle: 'hintShuffle', decompose: 'hintDecompose', album: 'hintAlbum' }[mode])}</div>

      {/* presets — quick start for beginners */}
      {(mode === 'pick' || mode === 'shuffle' || mode === 'album') &&
      <div className="presets">
        <span className="presets-label">{T('presetsLabel')}</span>
        {A.PRESETS.map((p) =>
        <button key={p.key} type="button" className="preset-btn"
          onClick={() => setSel({ ...p.sel })}
          title={p.label}>
          <span className="preset-icon">{p.icon}</span>
          <span className="preset-name">{window.I18N.labelFor(p)}</span>
        </button>
        )}
      </div>
      }

      {/* reference card in decompose mode */}
      {mode === 'decompose' &&
      <ReferenceCard sample={sampleRef} sel={sel}
      onReset={() => setSel({ ...sampleRef.decomposed })}
      onApply={() => setSel({ ...sampleRef.decomposed })} />
      }

      {/* the matrix board */}
      <div className={'board' + (rolling ? ' rolling' : '')}>
        {A.DIMS.map((d) =>
        <Column key={d.key} dim={d} value={sel[d.key]} onPick={pick}
        showLock={showLock} locked={!!locks[d.key]} onToggleLock={() => toggleLock(d.key)}
        refValue={mode === 'decompose' ? sampleRef.decomposed[d.key] : null} />
        )}
        <BpmColumn bpm={A.BPM} value={sel.bpm} onPick={pick}
        showLock={showLock} locked={!!locks.bpm} onToggleLock={() => toggleLock('bpm')} />
      </div>

      {/* console — album mode swaps in the axis builder */}
      {mode === 'album' ?
      <AlbumConsole axisKey={axisKey} count={trackCount} base={sel} busy={busy}
      onAxis={setAxisKey} onCount={setTrackCount} onBuild={buildAlbum} /> :

      <RecipeBar sel={sel} mode={mode} busy={busy} mutations={A.mutations(sel)}
      onGenerate={generate} onShuffle={shuffle} />
      }

      {/* production feed */}
      {mode === 'album' ?
      <div className="feed">
          <div className="feed-head">
            <span className="feed-title">{T('albumShelf')}</span>
            {albums.length > 0 &&
          <button type="button" className="feed-clear" onClick={() => setAlbums([])}>{T('clearAll')}</button>
          }
          </div>
          {albums.length === 0 ?
        <div className="empty">
              <Icon name="wave" size={22} />
              <p>{T('emptyAlbum')}</p>
            </div> :

        <div className="albshelf">
              {albums.map((a) =>
          <AlbumCard key={a.id} album={a} onStatus={setAlbumStatus} onDelete={removeAlbum} />
          )}
            </div>
        }
        </div> :

      <div className="feed">
          <div className="feed-head">
            <span className="feed-title">{T('prodFeed')}</span>
            {songs.length > 0 &&
          <button type="button" className="feed-clear" onClick={() => setSongs([])}>{T('clearAll')}</button>
          }
          </div>
          {songs.length === 0 ?
        <div className="empty">
              <Icon name="wave" size={22} />
              <p>{T('emptySong')}</p>
            </div> :

        <div className="feed-list">
              {songs.map((s) =>
          <SongCard key={s.id} song={s} onStatus={setStatus} onDelete={removeSong} />
          )}
            </div>
        }
        </div>
      }

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Look" />
        <TweakRadio label="Theme" value={t.theme}
        options={['console', 'lofi', 'clean', 'studio']}
        onChange={(v) => setTweak('theme', v)} />
        <TweakRadio label="Density" value={t.density}
        options={['compact', 'regular']}
        onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Engine" />
        <TweakToggle label="AI prompt generation" value={t.useAI}
        onChange={(v) => setTweak('useAI', v)} />
      </TweaksPanel>
      <Guide open={showGuide} onClose={() => setShowGuide(false)} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
